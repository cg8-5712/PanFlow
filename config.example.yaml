server:
  host: "0.0.0.0"
  port: "8080"
  mode: "release" # debug | release

database:
  driver: "mysql"   # mysql | postgres | sqlite
  host: "127.0.0.1"
  port: "3306"
  user: "root"
  password: ""
  name: "panflow"  # sqlite 时填文件路径，如 "panflow.db"

redis:
  host: "127.0.0.1"
  port: "6379"
  password: ""
  db: 0

log:
  level: "info" # debug | info | warn | error

panflow:
  admin_password: ""
  jwt_secret: "panflow-change-me"
  jwt_expire_hours: 2    # access token 有效期（小时）
  jwt_refresh_days: 7    # refresh token 有效期（天）
  debug: false
  guest_user_agent: "netdisk;P2SP;3.0.20.138"
  proxy_http: "" # 可选，格式: http://host:port
